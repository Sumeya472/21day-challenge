<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sumeya · weekly schedule & reflection</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #f4f7fb;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        padding: 2rem 1rem;
        display: flex;
        justify-content: center;
      }
      .container {
        max-width: 1000px;
        width: 100%;
        background: #ffffff;
        border-radius: 2.5rem;
        box-shadow: 0 20px 40px -10px rgba(0, 20, 30, 0.15);
        padding: 2rem 2rem 2.5rem;
        border: 1px solid #e9eef2;
      }
      h1 {
        font-size: 2.2rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #0a2c3d;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      h1 span {
        background: #d9e6f0;
        padding: 0.2rem 1.2rem;
        border-radius: 60px;
        font-size: 1.2rem;
        font-weight: 500;
        color: #1d4d5e;
      }
      .date-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        background: #f0f4fa;
        padding: 1rem 1.8rem;
        border-radius: 60px;
        margin: 1.5rem 0 2rem 0;
      }
      .date-picker {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .date-picker label {
        font-weight: 600;
        color: #1f4a5c;
      }
      .date-picker input {
        border: none;
        background: white;
        padding: 0.5rem 1.2rem;
        border-radius: 40px;
        font-size: 1rem;
        font-family: inherit;
        border: 1px solid #bccbd6;
        color: #0a2c3d;
      }
      .weekday-badge {
        background: #1a4b5e;
        color: white;
        padding: 0.5rem 2rem;
        border-radius: 40px;
        font-weight: 600;
        font-size: 1.3rem;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      }
      .grid-sections {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        margin: 2rem 0 2.2rem;
      }
      @media (max-width: 700px) {
        .grid-sections {
          grid-template-columns: 1fr;
        }
      }
      .day-card {
        background: #f9fcff;
        border-radius: 2rem;
        padding: 1.6rem 1.8rem;
        border: 1px solid #dde5ed;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.02);
      }
      .day-card h2 {
        font-size: 1.9rem;
        font-weight: 500;
        margin-bottom: 1.2rem;
        color: #0b3b44;
        border-left: 8px solid #68a5b9;
        padding-left: 1rem;
      }
      .task-list {
        list-style: none;
      }
      .task-list li {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.7rem 0.3rem;
        border-bottom: 1px solid #e3ecf3;
        font-size: 1.1rem;
      }
      .task-list li:last-child {
        border-bottom: none;
      }
      .task-list input[type="checkbox"] {
        width: 1.4rem;
        height: 1.4rem;
        accent-color: #368797;
        flex-shrink: 0;
      }
      .task-list label {
        color: #173e4a;
        line-height: 1.4;
      }
      .reflection-area {
        background: #f0f7fc;
        border-radius: 2rem;
        padding: 2rem 2rem 1.5rem;
        margin-top: 1rem;
        border: 1px solid #d0deea;
      }
      .reflection-pair {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 2rem;
      }
      .reflection-item {
        flex: 1 1 260px;
      }
      .reflection-item h3 {
        font-size: 1.5rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: #0b4b5c;
      }
      .reflection-item textarea {
        width: 100%;
        border-radius: 24px;
        border: 2px solid #c6dae8;
        padding: 1.2rem;
        font-size: 1rem;
        font-family: inherit;
        background: white;
        resize: vertical;
        min-height: 120px;
      }
      .reflection-item textarea:focus {
        border-color: #368797;
        outline: none;
      }
      .bottom-stats {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        background: #dee9f1;
        border-radius: 60px;
        padding: 0.8rem 2rem 0.8rem 2.2rem;
        margin: 2rem 0 1.8rem;
      }
      .progress-badge {
        background: #153e4b;
        color: white;
        padding: 0.3rem 1.5rem;
        border-radius: 40px;
        font-size: 1.2rem;
        font-weight: 500;
      }
      .weakness-preview {
        font-style: italic;
        color: #1e4e5a;
        max-width: 350px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .button-group {
        display: flex;
        gap: 1rem;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
      .btn {
        background: white;
        border: 2px solid #8da9b9;
        padding: 0.8rem 2.2rem;
        border-radius: 60px;
        font-size: 1.1rem;
        font-weight: 600;
        color: #153e4b;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-primary {
        background: #266d7a;
        border-color: #1b555f;
        color: white;
      }
      .btn-primary:hover {
        background: #1b4f59;
      }
      .btn:hover {
        background: #d1e2ed;
      }
      .storage-hint {
        margin-top: 0.5rem;
        font-size: 0.95rem;
        color: #587b84;
        text-align: right;
      }
      footer {
        text-align: center;
        margin-top: 2rem;
        color: #778f99;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📋 Sumeya · torban kee <span>frontend + afaan oromo + deen</span></h1>

      <!-- date selection & weekday -->
      <div class="date-bar">
        <div class="date-picker">
          <label for="dateInput">date</label>
          <input type="date" id="dateInput" />
        </div>
        <div class="weekday-badge" id="weekdayDisplay">Monday</div>
      </div>

      <!-- two columns: weekdays (mon-fri) and weekend (sat-sun) exactly as given -->
      <div class="grid-sections">
        <!-- Monday – Friday column -->
        <div class="day-card">
          <h2>🌤️ Mon – Fri</h2>
          <ul class="task-list" id="weekdayList">
            <li>
              <input type="checkbox" id="task1" /><label for="task1"
                >Frontend Learning (HTML / CSS / JS / React)</label
              >
            </li>
            <li>
              <input type="checkbox" id="task2" /><label for="task2"
                >Coding / Mini Project</label
              >
            </li>
            <li>
              <input type="checkbox" id="task3" /><label for="task3"
                >UI/UX Design Practice</label
              >
            </li>
            <li>
              <input type="checkbox" id="task4" /><label for="task4"
                >English Practice (Speaking / Presentation)</label
              >
            </li>
            <li>
              <input type="checkbox" id="task5" /><label for="task5"
                >Arabic Practice</label
              >
            </li>
            <li>
              <input type="checkbox" id="task6" /><label for="task6"
                >Afan Oromo Practice</label
              >
            </li>
            <li>
              <input type="checkbox" id="task7" /><label for="task7"
                >Religious / Mosque</label
              >
            </li>
            <li>
              <input type="checkbox" id="task8" /><label for="task8"
                >Social / Family Connection</label
              >
            </li>
          </ul>
        </div>

        <!-- Saturday – Sunday column -->
        <div class="day-card">
          <h2>🌿 Sat – Sun</h2>
          <ul class="task-list" id="weekendList">
            <li>
              <input type="checkbox" id="task9" /><label for="task9"
                >Frontend Review / New Concepts</label
              >
            </li>
            <li>
              <input type="checkbox" id="task10" /><label for="task10"
                >Work on Bigger Project (Portfolio / Blog UI / Task
                Manager)</label
              >
            </li>
            <li>
              <input type="checkbox" id="task11" /><label for="task11"
                >UI/UX Improvement</label
              >
            </li>
            <li>
              <input type="checkbox" id="task12" /><label for="task12"
                >English Practice (Presentation / Explain Project)</label
              >
            </li>
            <li>
              <input type="checkbox" id="task13" /><label for="task13"
                >Arabic Practice</label
              >
            </li>
            <li>
              <input type="checkbox" id="task14" /><label for="task14"
                >Afan Oromo Practice</label
              >
            </li>
            <li>
              <input type="checkbox" id="task15" /><label for="task15"
                >Religious / Mosque</label
              >
            </li>
            <li>
              <input type="checkbox" id="task16" /><label for="task16"
                >Social / Family Connection</label
              >
            </li>
          </ul>
        </div>
      </div>

      <!-- achievements & weaknesses (weekly) -->
      <div class="reflection-area">
        <div class="reflection-pair">
          <div class="reflection-item">
            <h3>✅ Weekly Achievements</h3>
            <textarea
              id="achievementsField"
              placeholder="e.g., finished React module, prayed Fajr on time 5 days..."
            ></textarea>
          </div>
          <div class="reflection-item">
            <h3>⚠️ Weaknesses / Next week focus</h3>
            <textarea
              id="weaknessesField"
              placeholder="what to leave behind, what to improve..."
            ></textarea>
          </div>
        </div>
      </div>

      <!-- bottom bar: progress + preview of weakness -->
      <div class="bottom-stats">
        <span class="progress-badge" id="progressDisplay">0/16 tasks</span>
        <span class="weakness-preview" id="weakPreview">next week: no </span>
      </div>

      <!-- action buttons -->
      <div class="button-group">
        <button class="btn" id="clearBtn">🗑️ clear day</button>
        <button class="btn btn-primary" id="saveBtn">💾 save progress</button>
      </div>
      <div class="storage-hint" id="storageMessage"></div>

      <footer>
        break time · afan oromo · religious bits · next week weaknesses
        disappear in shaa Allaah
      </footer>
    </div>

    <script>
      (function () {
        // ---------- DOM elements ----------
        const dateInput = document.getElementById("dateInput");
        const weekdaySpan = document.getElementById("weekdayDisplay");
        const achievementsField = document.getElementById("achievementsField");
        const weaknessesField = document.getElementById("weaknessesField");
        const progressDisplay = document.getElementById("progressDisplay");
        const weakPreview = document.getElementById("weakPreview");
        const saveBtn = document.getElementById("saveBtn");
        const clearBtn = document.getElementById("clearBtn");
        const storageMsg = document.getElementById("storageMessage");

        // Gather checkboxes (exactly 16)
        const weekdayChecks = [];
        const weekendChecks = [];
        for (let i = 1; i <= 8; i++)
          weekdayChecks.push(document.getElementById(`task${i}`));
        for (let i = 9; i <= 16; i++)
          weekendChecks.push(document.getElementById(`task${i}`));

        const allCheckboxes = [...weekdayChecks, ...weekendChecks]; // 16

        // Helper: check if date is weekend (sat=6, sun=0)
        function isWeekendDate(dateStr) {
          if (!dateStr) return false;
          const d = new Date(dateStr);
          if (isNaN(d.getTime())) return false;
          const day = d.getDay(); // 0 sun, 6 sat
          return day === 0 || day === 6;
        }

        // Update weekday text from dateInput
        function updateWeekdayDisplay() {
          const dateVal = dateInput.value;
          if (!dateVal) {
            weekdaySpan.textContent = "——";
            return;
          }
          const d = new Date(dateVal);
          if (isNaN(d.getTime())) {
            weekdaySpan.textContent = "invalid";
            return;
          }
          const weekdays = [
            "Sunday",
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday",
          ];
          weekdaySpan.textContent = weekdays[d.getDay()];
        }

        // Count completed tasks among all 16
        function countCompleted() {
          return allCheckboxes.filter((cb) => cb && cb.checked).length;
        }

        function updateProgress() {
          const done = countCompleted();
          progressDisplay.textContent = `⭐ ${done}/16 tasks`;
        }

        // Update weakness preview from weaknessesField
        function updateWeakPreview() {
          let txt = weaknessesField.value.trim();
          if (!txt) {
            weakPreview.textContent = "next week: —";
            return;
          }
          // first line or short version
          const firstLine = txt.split("\n")[0];
          const short =
            firstLine.length > 35 ?
              firstLine.substring(0, 32) + "…"
            : firstLine;
          weakPreview.textContent = `next week: ${short}`;
        }

        // Load data for selected date from localStorage
        function loadForDate() {
          const selectedDate = dateInput.value;
          if (!selectedDate) return;

          const key = `sumeya_${selectedDate}`;
          const saved = localStorage.getItem(key);
          if (saved) {
            try {
              const data = JSON.parse(saved);
              // set checkboxes according to saved tasks array (length 16 expected)
              if (Array.isArray(data.tasks) && data.tasks.length === 16) {
                allCheckboxes.forEach((cb, idx) => {
                  if (cb) cb.checked = data.tasks[idx] === true;
                });
              } else {
                // fallback: reset all
                allCheckboxes.forEach((cb) => (cb.checked = false));
              }
              achievementsField.value = data.achievements || "";
              weaknessesField.value = data.weaknesses || "";
            } catch (e) {
              console.warn("parse error", e);
            }
          } else {
            // no saved data -> reset checks & fields
            allCheckboxes.forEach((cb) => (cb.checked = false));
            achievementsField.value = "";
            weaknessesField.value = "";
          }
          // always update ui after load
          updateProgress();
          updateWeakPreview();
          storageMsg.textContent = `📂 loaded: ${selectedDate}`;
        }

        // Save current state for selected date
        function saveCurrent() {
          const selectedDate = dateInput.value;
          if (!selectedDate) {
            alert("Please select a date");
            return;
          }

          const tasksState = allCheckboxes.map((cb) => cb.checked);
          const data = {
            tasks: tasksState,
            achievements: achievementsField.value,
            weaknesses: weaknessesField.value,
            lastUpdated: new Date().toISOString(),
          };
          localStorage.setItem(`sumeya_${selectedDate}`, JSON.stringify(data));
          storageMsg.textContent = `✅ saved for ${selectedDate}`;
        }

        // Clear ONLY the selected date's data
        function clearSelectedDate() {
          const selectedDate = dateInput.value;
          if (!selectedDate) {
            alert("Pick a date first");
            return;
          }
          if (confirm(`Erase all data for ${selectedDate}?`)) {
            localStorage.removeItem(`sumeya_${selectedDate}`);
            loadForDate(); // resets to empty
            storageMsg.textContent = `🧹 cleared ${selectedDate}`;
          }
        }

        // event listeners
        dateInput.addEventListener("change", function () {
          updateWeekdayDisplay();
          loadForDate();
        });

        // realtime updates for progress & weakness preview
        allCheckboxes.forEach((cb) => {
          if (cb)
            cb.addEventListener("change", function () {
              updateProgress();
              // auto-save? we don't auto-save, just update ui
            });
        });

        weaknessesField.addEventListener("input", updateWeakPreview);
        achievementsField.addEventListener("input", function () {
          // you could add preview but not needed
        });

        saveBtn.addEventListener("click", saveCurrent);
        clearBtn.addEventListener("click", clearSelectedDate);

        // set default date to today and trigger load
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, "0");
        const day = String(today.getDate()).padStart(2, "0");
        const todayStr = `${year}-${month}-${day}`;
        dateInput.value = todayStr;
        updateWeekdayDisplay();
        loadForDate();
        clearBtn.addEventListener("dblclick", function () {
          storageMsg.textContent =
            "double‑click clears only selected date data";
        });

        updateProgress();
        updateWeakPreview();
      })();
    </script>
  </body>
</html>
